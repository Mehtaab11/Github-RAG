services:
  qdrant:
    image: qdrant/qdrant:v1.18.0
    container_name: github_chat_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: always

  redis:
    image: redis:7.2-alpine
    container_name: github_chat_redis
    ports:
      - "6379:6379"

    volumes:
      - redis_data:/data
    restart: always
volumes:
  qdrant_storage:
  redis_data:
